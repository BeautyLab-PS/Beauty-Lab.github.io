<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Lab</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>💗 Beauty Lab</h1>
  <input id="search" placeholder="Търси продукти... 🔎">
</header>

<!-- MENU -->
<nav class="menu">
  <button onclick="filter('all')">Home</button>
  <button onclick="filter('face')">Лице</button>
  <button onclick="filter('body')">Тяло</button>
  <button onclick="filter('hair')">Коса</button>
  <button onclick="filter('makeup')">Грим</button>
  <button onclick="filter('accessories')">Аксесоари</button>
</nav>

<!-- PRODUCTS -->
<main>
  <div id="products"></div>
</main>

<!-- PRODUCT PAGE (MODAL STYLE) -->
<div id="productPage">
  <div class="productBox">
    <span onclick="closeProduct()">✖</span>
    <img id="pImg">
    <h2 id="pName"></h2>
    <p id="pDesc"></p>
    <h3 id="pPrice"></h3>
    <button onclick="addCart()">🛒 Добави в количка</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
