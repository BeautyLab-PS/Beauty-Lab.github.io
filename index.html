<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Lab</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>💗 Beauty Lab</h1>
  <input id="search" placeholder="Търси продукти... 🔎">
</header>

<nav>
  <button onclick="filter('all')">Home</button>
  <button onclick="filter('face')">Лице</button>
  <button onclick="filter('body')">Тяло</button>
  <button onclick="filter('hair')">Коса</button>
  <button onclick="filter('makeup')">Грим</button>
  <button onclick="filter('accessories')">Аксесоари ✨</button>
</nav>

<main>
  <div id="products"></div>
</main>

<!-- PRODUCT MODAL -->
<div id="modal">
  <div class="modalBox">
    <span onclick="closeModal()">✖</span>
    <img id="mImg">
    <h2 id="mName"></h2>
    <p id="mDesc"></p>
    <h3 id="mPrice"></h3>
    <button onclick="addToCart()">Добави 🛒</button>
  </div>
</div>

<!-- CART -->
<div id="cartBox" class="box">
  <h2>🛒 Количка</h2>
  <div id="cartItems"></div>
</div>

<!-- FAVORITES -->
<div id="favBox" class="box">
  <h2>❤️ Любими</h2>
  <div id="favItems"></div>
</div>

<script src="script.js"></script>
</body>
</html>
