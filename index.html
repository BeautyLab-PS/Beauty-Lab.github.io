<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Lab</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>💗 Beauty Lab</h1>
  <input id="search" placeholder="Търси продукти... 🔎">
</header>

<!-- 🌸 HERO BANNER -->
<div class="hero">
  <h2>Луксозна козметика онлайн 💄</h2>
  <p>Най-добрите beauty продукти за теб</p>
</div>

<!-- NAV -->
<nav>
  <button onclick="filter('all')">Home</button>
  <button onclick="filter('face')">Лице</button>
  <button onclick="filter('body')">Тяло</button>
  <button onclick="filter('hair')">Коса</button>
  <button onclick="filter('makeup')">Грим</button>
  <button onclick="filter('accessories')">Аксесоари</button>
</nav>

<!-- PRODUCTS -->
<main>
  <div id="products"></div>
</main>

<!-- CONTACT -->
<section class="contact">
  <h2>📩 Контакт с нас</h2>
  <p>Email: beauty@lab.com</p>
  <p>Телефон: +359 888 123 456</p>
  <textarea placeholder="Напиши съобщение..."></textarea>
  <button>Изпрати</button>
</section>

<!-- MODAL -->
<div id="modal">
  <div class="modalBox">
    <span onclick="closeModal()">✖</span>
    <img id="mImg">
    <h2 id="mName"></h2>
    <p id="mDesc"></p>
    <h3 id="mPrice"></h3>
    <button onclick="addToCart()">🛒 Добави</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
